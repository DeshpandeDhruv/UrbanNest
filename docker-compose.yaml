version: "3.9"

services:
  backend:
    build:
      context: ./api
    container_name: urban-backend
    ports:
      - "5000:5000"
    env_file:
      - ./api/.env
    restart: always

  frontend:
    build:
      context: ./client
    container_name: urban-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always