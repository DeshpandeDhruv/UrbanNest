name: CI Pipeline

on:
  push:
    branches:
      - docker-phase-1
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/urban-backend
      IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/urban-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Git metadata
        id: meta
        run: |
          echo "SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BRANCH_NAME=${GITHUB_REF##*/}" >> $GITHUB_ENV

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ env.SHA_TAG }}
            ${{ env.IMAGE_BACKEND }}:${{ env.BRANCH_NAME }}-latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ env.SHA_TAG }}
            ${{ env.IMAGE_FRONTEND }}:${{ env.BRANCH_NAME }}-latest